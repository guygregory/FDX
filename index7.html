<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FDX &mdash; Frontier Disambiguation Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset & Nature Tokens ───────────────────── */
        :root {
            --bg: #F4EDE4;
            --bg-warm: #EDE5D8;
            --surface: rgba(93,64,51,0.04);
            --surface-hover: rgba(93,64,51,0.08);
            --surface-card: rgba(255,255,255,0.65);
            --border: rgba(93,64,51,0.10);
            --border-hover: rgba(93,64,51,0.18);
            --text: #5C4033;
            --text-dim: #6B5244;
            --text-muted: #9C8575;
            --accent: #2D5016;
            --accent-soft: #7C9473;
            --accent-dim: rgba(45,80,22,0.10);
            --accent-glow: rgba(45,80,22,0.15);
            --terracotta: #C4603A;
            --terracotta-dim: rgba(196,96,58,0.12);
            --amber: #B8860B;
            --sage: #7C9473;
            --sage-dim: rgba(124,148,115,0.15);
            --title-from: #2D5016;
            --title-to: #C4603A;
            --topbar-bg: rgba(244,237,228,0.88);
            --card-heading: #3A2A1E;
            --card-hover-shadow: rgba(93,64,51,0.08);
            --noise-opacity: 0.03;
            --r: 14px;
            --r-lg: 24px;
            --r-pill: 50px;
            --max-w: 920px;
            --nav-h: 0px;
            --leaf-color: rgba(45,80,22,0.06);
            --wave-color: rgba(124,148,115,0.12);
        }

        html.dark {
            --bg: #1A2E12;
            --bg-warm: #162810;
            --surface: rgba(255,255,255,0.04);
            --surface-hover: rgba(255,255,255,0.07);
            --surface-card: rgba(255,255,255,0.04);
            --border: rgba(255,255,255,0.08);
            --border-hover: rgba(255,255,255,0.14);
            --text: #D4CBBA;
            --text-dim: #B8AE9C;
            --text-muted: #8A8272;
            --accent: #8FBF7A;
            --accent-soft: #6A9960;
            --accent-dim: rgba(143,191,122,0.12);
            --accent-glow: rgba(143,191,122,0.18);
            --terracotta: #E09060;
            --terracotta-dim: rgba(224,144,96,0.12);
            --amber: #E8A845;
            --sage: #6A9960;
            --sage-dim: rgba(106,153,96,0.12);
            --title-from: #8FBF7A;
            --title-to: #E8A845;
            --topbar-bg: rgba(26,46,18,0.90);
            --card-heading: #E8DFC8;
            --card-hover-shadow: rgba(143,191,122,0.06);
            --noise-opacity: 0.04;
            --leaf-color: rgba(143,191,122,0.04);
            --wave-color: rgba(106,153,96,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Nunito', 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.72;
            min-height: 100dvh;
            overflow-x: hidden;
            position: relative;
        }

        /* ─── Organic Noise Texture Overlay ───────────── */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: 9999;
            pointer-events: none;
            opacity: var(--noise-opacity);
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            background-repeat: repeat;
            background-size: 256px 256px;
        }

        /* ─── Ambient Nature Background ───────────────── */
        .scene {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        /* Warm dappled light effect */
        .scene::before {
            content: '';
            position: absolute;
            width: 900px;
            height: 900px;
            top: -400px;
            left: 20%;
            background: radial-gradient(ellipse, var(--leaf-color) 0%, transparent 60%);
            animation: dapple 18s ease-in-out infinite alternate;
        }

        .scene::after {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            bottom: -200px;
            right: -100px;
            background: radial-gradient(ellipse, var(--wave-color) 0%, transparent 65%);
            animation: dapple 22s ease-in-out infinite alternate-reverse;
        }

        @keyframes dapple {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, 15px) scale(1.08); }
            100% { transform: translate(-20px, -10px) scale(0.95); }
        }

        /* Decorative leaf shapes */
        .leaf-decor {
            position: fixed;
            z-index: -1;
            pointer-events: none;
        }

        .leaf-decor::before,
        .leaf-decor::after {
            content: '';
            position: absolute;
            border-radius: 0 50% 50% 50%;
            opacity: 0.04;
        }

        .leaf-decor::before {
            width: 180px;
            height: 120px;
            top: 15vh;
            right: 3vw;
            background: var(--accent);
            transform: rotate(-25deg);
        }

        .leaf-decor::after {
            width: 140px;
            height: 90px;
            bottom: 20vh;
            left: 2vw;
            background: var(--terracotta);
            transform: rotate(155deg);
        }

        /* ─── Shell ───────────────────────────────────── */
        .shell {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 clamp(18px, 4vw, 36px);
        }

        /* ─── Sticky Header ───────────────────────────── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--topbar-bg);
            backdrop-filter: blur(20px) saturate(1.3);
            -webkit-backdrop-filter: blur(20px) saturate(1.3);
            padding: 14px 0 12px;
        }

        /* Wavy bottom border for header */
        .topbar::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 0;
            right: 0;
            height: 8px;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 8' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Cpath d='M0,4 Q150,0 300,4 T600,4 T900,4 T1200,4 L1200,8 L0,8 Z' fill='%23F4EDE4' opacity='0.5'/%3E%3C/svg%3E") repeat-x;
            background-size: 1200px 8px;
            pointer-events: none;
        }

        html.dark .topbar::after {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 1200 8' xmlns='http://www.w3.org/2000/svg' preserveAspectRatio='none'%3E%3Cpath d='M0,4 Q150,0 300,4 T600,4 T900,4 T1200,4 L1200,8 L0,8 Z' fill='%231A2E12' opacity='0.5'/%3E%3C/svg%3E");
        }

        .topbar-title {
            text-align: center;
            margin-bottom: 16px;
            padding-top: 6px;
        }

        .topbar-title h1 {
            font-family: 'Libre Baskerville', Georgia, 'Times New Roman', serif;
            font-size: clamp(1.55rem, 4.2vw, 2.2rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            line-height: 1.25;
            white-space: nowrap;
        }

        .title-link {
            text-decoration: none;
            color: inherit;
            background: linear-gradient(135deg, var(--title-from) 30%, var(--title-to) 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Leaf flourish on title */
        .title-flourish {
            display: inline-block;
            margin-left: 6px;
            opacity: 0.5;
            font-size: 0.7em;
            vertical-align: middle;
            -webkit-text-fill-color: var(--sage);
            animation: sway 4s ease-in-out infinite;
        }

        @keyframes sway {
            0%, 100% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
        }

        /* ─── Theme Toggle ────────────────────────────── */
        .theme-toggle {
            position: fixed;
            right: clamp(16px, 4vw, 32px);
            bottom: 28px;
            z-index: 200;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            border: 1.5px solid var(--border);
            border-radius: 50%;
            background: var(--surface-card);
            color: var(--text-muted);
            cursor: pointer;
            transition: color 0.3s, background 0.3s, border-color 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 12px rgba(93,64,51,0.06);
        }

        @media (hover: hover) {
            .theme-toggle:hover {
                color: var(--accent);
                background: var(--surface-hover);
                border-color: var(--accent-soft);
                box-shadow: 0 4px 20px var(--accent-glow);
                transform: scale(1.06);
            }
        }

        .theme-toggle:focus-visible {
            color: var(--accent);
            outline: 2px solid var(--accent);
            outline-offset: 2px;
            border-color: var(--accent);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: transform 0.3s ease;
        }

        /* ─── Navigation ──────────────────────────────── */
        .topbar-nav {
            overflow: hidden;
        }

        .topbar-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 clamp(16px, 4vw, 32px);
            display: flex;
            align-items: center;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .topbar-inner::-webkit-scrollbar { display: none; }

        .topbar-inner a {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: var(--r-pill);
            border: 1.5px solid transparent;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            background: transparent;
        }

        @media (hover: hover) {
            .topbar-inner a:hover {
                color: var(--accent);
                background: var(--sage-dim);
                border-color: var(--sage);
                box-shadow: 0 2px 10px var(--accent-glow);
            }
        }

        .topbar-inner a:focus-visible {
            color: var(--accent);
            background: var(--sage-dim);
            border-color: var(--sage);
            outline: none;
        }

        .topbar-inner a.active {
            color: var(--card-heading);
            background: var(--accent-dim);
            border-color: var(--accent-soft);
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        /* ─── Cards ───────────────────────────────────── */
        .cards {
            padding: 28px 0 90px;
            display: flex;
            flex-direction: column;
            gap: 28px;
        }

        .card {
            position: relative;
            background: var(--surface-card);
            border: 1.5px solid var(--border);
            border-radius: var(--r-lg);
            overflow: hidden;
            scroll-margin-top: calc(var(--nav-h) + 36px);
            transition: border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        @media (hover: hover) {
            .card:hover {
                border-color: var(--border-hover);
                box-shadow: 0 8px 40px var(--card-hover-shadow),
                            0 2px 8px rgba(93,64,51,0.04);
                transform: translateY(-2px);
            }
        }

        /* Organic accent line - curved top border */
        .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--sage), var(--accent), var(--terracotta), var(--sage));
            opacity: 0.35;
            border-radius: var(--r-lg) var(--r-lg) 0 0;
        }

        .card-inner {
            padding: clamp(24px, 3.5vw, 40px);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 22px;
            padding-bottom: 18px;
            border-bottom: 1px dashed var(--border);
            position: relative;
        }

        /* Decorative leaf before heading */
        .card-header::before {
            content: '🌿';
            font-size: 1.2rem;
            opacity: 0.5;
            flex-shrink: 0;
        }

        .card-header h2 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: clamp(1.35rem, 3vw, 1.75rem);
            font-weight: 700;
            letter-spacing: -0.01em;
            color: var(--card-heading);
            line-height: 1.25;
        }

        .card-source {
            margin-left: auto;
            flex-shrink: 0;
            font-family: 'Nunito', sans-serif;
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r-pill);
            padding: 4px 12px;
            letter-spacing: 0.02em;
        }

        /* ─── Markdown Content ────────────────────────── */
        .md {
            font-size: 0.94rem;
            color: var(--text-dim);
            line-height: 1.78;
        }

        .md h1 { display: none; }

        .md h2 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 0.88rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
            color: var(--accent);
            margin: 30px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px dashed var(--border);
            position: relative;
        }

        .md h2:first-of-type {
            margin-top: 0;
        }

        .md h3 {
            font-family: 'Libre Baskerville', Georgia, serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--text);
            margin: 22px 0 10px;
        }

        .md p {
            margin: 0 0 14px;
        }

        .md ul {
            margin: 0 0 16px;
            padding-left: 22px;
            list-style: none;
        }

        .md li {
            margin-top: 7px;
            position: relative;
            padding-left: 6px;
        }

        .md li::before {
            content: '●';
            position: absolute;
            left: -18px;
            color: var(--sage);
            font-size: 0.5em;
            top: 0.6em;
        }

        .md strong {
            color: var(--text);
            font-weight: 700;
        }

        .md code {
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.85em;
            background: var(--sage-dim);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 0.15em 0.5em;
            color: var(--accent);
        }

        .md a {
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1.5px solid var(--terracotta-dim);
            transition: border-color 0.3s, color 0.3s;
        }

        @media (hover: hover) {
            .md a:hover {
                border-bottom-color: var(--terracotta);
                color: var(--accent);
            }
        }

        .md a:focus-visible {
            border-bottom-color: var(--terracotta);
            outline: none;
        }

        /* Resources block */
        .md .resources-block {
            margin-top: 26px;
            padding: 20px 22px;
            background: var(--sage-dim);
            border: 1px solid var(--border);
            border-radius: var(--r);
            border-left: 3px solid var(--sage);
            position: relative;
        }

        .md .resources-block::before {
            content: '📚';
            position: absolute;
            top: 18px;
            right: 18px;
            font-size: 1.1rem;
            opacity: 0.4;
        }

        .md .resources-block h2 {
            margin-top: 0;
            border-bottom: none;
            padding-bottom: 0;
            color: var(--accent);
        }

        .md .resources-block a {
            color: var(--accent);
            border-bottom-color: var(--accent-dim);
        }

        @media (hover: hover) {
            .md .resources-block a:hover {
                border-bottom-color: var(--accent);
                color: var(--terracotta);
            }
        }

        /* Loading */
        .card-loading {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            animation: breathe 2s ease-in-out infinite;
        }

        .card-loading::after { content: '...'; }

        @keyframes breathe {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.35; }
        }

        /* ─── Card Bloom Animation ────────────────────── */
        .card {
            opacity: 0;
            transform: translateY(30px) scale(0.97);
            transition: opacity 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                        transform 0.7s cubic-bezier(0.34, 1.56, 0.64, 1),
                        border-color 0.4s cubic-bezier(0.4, 0, 0.2, 1),
                        box-shadow 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Staggered bloom animation for multiple cards */
        .card:nth-child(1) { transition-delay: 0ms; }
        .card:nth-child(2) { transition-delay: 60ms; }
        .card:nth-child(3) { transition-delay: 120ms; }
        .card:nth-child(4) { transition-delay: 180ms; }
        .card:nth-child(5) { transition-delay: 240ms; }
        .card:nth-child(6) { transition-delay: 300ms; }
        .card:nth-child(7) { transition-delay: 360ms; }

        /* ─── Wavy Divider ────────────────────────────── */
        .wave-divider {
            width: 100%;
            height: 24px;
            margin: 0 auto;
            opacity: 0.25;
        }

        .wave-divider path {
            fill: none;
            stroke: var(--sage);
            stroke-width: 1.5;
        }

        /* ─── Footer ──────────────────────────────────── */
        footer {
            text-align: center;
            padding: 0 24px 56px;
            color: var(--text-muted);
            font-size: 0.82rem;
            font-weight: 500;
        }

        .footer-leaf {
            display: block;
            margin: 0 auto 14px;
            font-size: 1.4rem;
            opacity: 0.35;
            animation: sway 5s ease-in-out infinite;
        }

        .footer-wave {
            width: 80px;
            height: 12px;
            margin: 0 auto 16px;
            display: block;
        }

        .footer-wave path {
            fill: none;
            stroke: var(--sage);
            stroke-width: 1;
            opacity: 0.4;
        }

        footer a {
            color: var(--terracotta);
            text-decoration: none;
            font-weight: 600;
            border-bottom: 1px solid transparent;
            transition: border-color 0.3s;
        }

        @media (hover: hover) {
            footer a:hover { border-bottom-color: var(--terracotta); }
        }

        /* ─── Scrollbar ───────────────────────────────── */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: var(--sage);
            border-radius: 10px;
            opacity: 0.5;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ─── Selection ───────────────────────────────── */
        ::selection {
            background: var(--sage-dim);
            color: var(--accent);
        }

        /* ─── Responsive ──────────────────────────────── */
        @media (max-width: 640px) {
            .card-source { display: none; }
            .card-header { gap: 10px; }
            .theme-toggle { display: none; }
            .topbar-title h1 { font-size: clamp(1.05rem, 5vw, 1.45rem); }
            .title-abbr { display: none; }
            .topbar { background: var(--bg); }
            .leaf-decor { display: none; }
            .cards { gap: 20px; }
            .card-inner { padding: 20px; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .card,
            .topbar-inner a,
            .theme-toggle {
                transition: none !important;
                animation: none !important;
                opacity: 1;
                transform: none;
            }
            .scene::before,
            .scene::after,
            .title-flourish,
            .footer-leaf {
                animation: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="scene" aria-hidden="true"></div>
    <div class="leaf-decor" aria-hidden="true"></div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24"></svg>
    </button>

    <!-- Sticky Header + Nav -->
    <header class="topbar" aria-label="Frontier topics">
        <div class="topbar-title shell">
            <h1>
                <a href="https://fdx.guygregory.com/" class="title-link">
                    Frontier Disambiguation Experience<span class="title-abbr"> (FDX)</span>
                </a>
                <span class="title-flourish" aria-hidden="true">&#127807;</span>
            </h1>
        </div>
        <nav class="topbar-nav">
            <div class="topbar-inner" id="topNav"></div>
        </nav>
    </header>

    <!-- Content -->
    <div class="shell">
        <div class="cards" id="cardContainer"></div>
    </div>

    <footer>
        <svg class="footer-wave" viewBox="0 0 80 12" preserveAspectRatio="none" aria-hidden="true">
            <path d="M0,6 Q10,2 20,6 T40,6 T60,6 T80,6"/>
        </svg>
        <span class="footer-leaf" aria-hidden="true">&#127811;</span>
        Created by Guy Gregory and GitHub Copilot
    </footer>

    <script>
    (() => {
        'use strict';

        const TOPICS = [
            { id: 'frontier-firm', label: 'Frontier Firm', src: 'frontierfirm.md' },
            { id: 'frontier-program', label: 'Frontier Program', src: 'frontierprogram.md' },
            { id: 'frontier-partner', label: 'Frontier Partner', src: 'frontierpartner.md' },
            { id: 'frontier-distributor', label: 'Frontier Distributor', src: 'frontierdistributor.md' },
            { id: 'frontier-ai', label: 'Frontier AI', src: 'frontierai.md' },
            { id: 'frontier-model-forum', label: 'Frontier Model Forum', src: 'frontiermodelforum.md' },
            { id: 'openai-frontier', label: 'OpenAI Frontier', src: 'openaifrontier.md' }
        ];

        const nav = document.getElementById('topNav');
        const container = document.getElementById('cardContainer');

        /* ── Build DOM ───────────────────────────────── */
        function build() {
            const navFrag = document.createDocumentFragment();
            const cardFrag = document.createDocumentFragment();

            TOPICS.forEach((t, i) => {
                // nav link
                const a = document.createElement('a');
                a.href = `#${t.id}`;
                a.dataset.target = t.id;
                a.innerHTML = esc(t.label);
                navFrag.appendChild(a);

                // card
                const article = document.createElement('article');
                article.className = 'card';
                article.id = t.id;
                article.setAttribute('aria-busy', 'true');
                article.innerHTML = `
                    <div class="card-accent" aria-hidden="true"></div>
                    <div class="card-inner">
                        <header class="card-header">
                            <h2>${esc(t.label)}</h2>
                            <span class="card-source">${esc(t.src)}</span>
                        </header>
                        <div class="md" aria-live="polite">
                            <p class="card-loading">Loading</p>
                        </div>
                    </div>`;
                cardFrag.appendChild(article);
            });

            nav.appendChild(navFrag);
            container.appendChild(cardFrag);
        }

        /* ── Fetch & Render Markdown ─────────────────── */
        async function hydrate() {
            const cards = Array.from(document.querySelectorAll('.card[aria-busy]'));
            await Promise.all(cards.map(async card => {
                const topic = TOPICS.find(t => t.id === card.id);
                if (!topic) return;
                const mdEl = card.querySelector('.md');
                try {
                    const res = await fetch(topic.src, { cache: 'no-store' });
                    if (!res.ok) throw new Error(res.status);
                    mdEl.innerHTML = md(await res.text());
                    wrapResources(mdEl);
                } catch {
                    mdEl.innerHTML = '<p>Unable to load content.</p>';
                } finally {
                    card.removeAttribute('aria-busy');
                }
            }));
        }

        /* ── Markdown parser ─────────────────────────── */
        function md(raw) {
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            let out = '';
            let buf = [];
            let ul = false;

            const flush = () => { if (buf.length) { out += `<p>${inline(buf.join(' '))}</p>`; buf = []; } };
            const closeUl = () => { if (ul) { out += '</ul>'; ul = false; } };

            for (const rawLine of lines) {
                const line = rawLine.trim();
                if (!line) { flush(); closeUl(); continue; }

                const hm = line.match(/^(#{1,3})\s+(.*)$/);
                if (hm) { flush(); closeUl(); const l = hm[1].length; out += `<h${l}>${inline(hm[2])}</h${l}>`; continue; }

                const lm = rawLine.match(/^\s*[-*]\s+(.*)$/);
                if (lm) { flush(); if (!ul) { out += '<ul>'; ul = true; } out += `<li>${inline(lm[1])}</li>`; continue; }

                buf.push(line);
            }
            flush();
            closeUl();
            return out;
        }

        function inline(t) {
            let s = esc(t);
            s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
            return s;
        }

        function esc(v) {
            return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        /* ── Wrap Resources sections ─────────────────── */
        function wrapResources(el) {
            el.querySelectorAll('h2').forEach(h => {
                if (h.textContent.trim().toLowerCase() !== 'resources') return;
                const wrap = document.createElement('section');
                wrap.className = 'resources-block';
                h.parentNode.insertBefore(wrap, h);
                let cur = h;
                while (cur) {
                    const next = cur.nextElementSibling;
                    wrap.appendChild(cur);
                    if (!next || next.tagName === 'H2') break;
                    cur = next;
                }
            });
        }

        /* ── Sticky nav offset ───────────────────────── */
        function measureNav() {
            const bar = document.querySelector('.topbar');
            if (bar) document.documentElement.style.setProperty('--nav-h', bar.offsetHeight + 'px');
        }

        /* ── Scroll-reveal cards ─────────────────────── */
        function initReveal() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.card').forEach(c => c.classList.add('visible'));
                return;
            }
            const io = new IntersectionObserver((entries, obs) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });
            document.querySelectorAll('.card').forEach(c => io.observe(c));
        }

        /* ── Active nav tracking ─────────────────────── */
        function initActiveNav() {
            if (!('IntersectionObserver' in window)) return;
            const links = Array.from(nav.querySelectorAll('a[data-target]'));
            const sections = links.map(l => document.getElementById(l.dataset.target)).filter(Boolean);
            let clickLock = false;

            const setActive = id => {
                links.forEach(l => {
                    const on = l.dataset.target === id;
                    l.classList.toggle('active', on);
                    on ? l.setAttribute('aria-current', 'true') : l.removeAttribute('aria-current');
                    if (on) l.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
                });
            };

            const io = new IntersectionObserver(entries => {
                if (clickLock) return;
                const vis = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
                if (vis.length) setActive(vis[0].target.id);
            }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });

            sections.forEach(s => io.observe(s));

            // Click handler
            nav.addEventListener('click', e => {
                const a = e.target.closest('a[data-target]');
                if (!a) return;
                e.preventDefault();
                const target = document.getElementById(a.dataset.target);
                if (!target) return;
                clickLock = true;
                setActive(a.dataset.target);
                scrollToCard(target);
                history.replaceState(null, '', `#${a.dataset.target}`);
                setTimeout(() => { clickLock = false; }, 1000);
            });
        }

        /* ── Scroll helper ───────────────────────────── */
        function scrollToCard(el) {
            const bar = document.querySelector('.topbar');
            const gap = 24;
            const top = el.getBoundingClientRect().top + window.scrollY - (bar ? bar.offsetHeight : 0) - gap;
            window.scrollTo({ top, behavior: 'smooth' });
        }

        /* ── Initial hash ────────────────────────────── */
        function jumpHash() {
            const { hash } = window.location;
            if (!hash) return;
            const el = document.querySelector(hash);
            if (el) requestAnimationFrame(() => scrollToCard(el));
        }

        /* ── Theme toggle ─────────────────────────────── */
        const ICONS = {
            dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>',
            light: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
            system: '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'
        };
        const MODES = ['system', 'dark', 'light'];
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function getPreferred() {
            return localStorage.getItem('fdx-theme') || 'system';
        }

        function resolveTheme(mode) {
            if (mode === 'system') return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            return mode;
        }

        function applyTheme(mode) {
            const resolved = resolveTheme(mode);
            document.documentElement.classList.toggle('dark', resolved === 'dark');
            themeIcon.innerHTML = ICONS[mode];
            themeBtn.setAttribute('aria-label', `Theme: ${mode}`);
        }

        const MOBILE_BP = 640;

        function isMobile() {
            return window.innerWidth <= MOBILE_BP;
        }

        function initTheme() {
            applyTheme(isMobile() ? 'system' : getPreferred());
            themeBtn.addEventListener('click', () => {
                if (isMobile()) return;
                const cur = getPreferred();
                const next = MODES[(MODES.indexOf(cur) + 1) % MODES.length];
                localStorage.setItem('fdx-theme', next);
                applyTheme(next);
            });
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
                if (isMobile() || getPreferred() === 'system') applyTheme('system');
            });
            window.addEventListener('resize', () => {
                if (isMobile()) applyTheme('system');
                else applyTheme(getPreferred());
            }, { passive: true });
        }

        /* ── Boot ────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            build();
            measureNav();
            window.addEventListener('resize', measureNav, { passive: true });
            await hydrate();
            initReveal();
            initActiveNav();
            jumpHash();
        });
    })();
    </script>
</body>
</html>
