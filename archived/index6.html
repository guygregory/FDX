<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>FDX &mdash; Frontier Disambiguation Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Raleway:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Poiret+One&display=swap" rel="stylesheet">
    <style>
        /* ─── Art Deco Tokens ─────────────────────────── */
        :root {
            --bg: #0A1628;
            --bg-deep: #060E1A;
            --surface: rgba(212,175,55,0.04);
            --surface-hover: rgba(212,175,55,0.08);
            --surface-card: rgba(255,255,255,0.025);
            --border: rgba(212,175,55,0.18);
            --border-hover: rgba(212,175,55,0.38);
            --border-strong: rgba(212,175,55,0.5);
            --text: #F5F0E8;
            --text-dim: #C4BBAA;
            --text-muted: #8A8070;
            --gold: #D4AF37;
            --gold-bright: #E8C84A;
            --brass: #C5975B;
            --cream: #F5F0E8;
            --ivory: #FAF7F0;
            --navy: #0A1628;
            --navy-mid: #152238;
            --accent: #D4AF37;
            --accent-dim: rgba(212,175,55,0.12);
            --accent-glow: rgba(212,175,55,0.2);
            --topbar-bg: rgba(10,22,40,0.92);
            --card-heading: #FAF7F0;
            --card-hover-shadow: rgba(212,175,55,0.06);
            --pattern-line: rgba(212,175,55,0.04);
            --r: 2px;
            --r-lg: 2px;
            --max-w: 960px;
            --nav-h: 0px;
            --gold-gradient: linear-gradient(135deg, #D4AF37, #E8C84A, #C5975B);
            --gold-line: linear-gradient(90deg, transparent, #D4AF37, transparent);
            --deco-pattern: rgba(212,175,55,0.03);
        }

        html.light {
            --bg: #FAF7F0;
            --bg-deep: #F0EBE0;
            --surface: rgba(10,22,40,0.03);
            --surface-hover: rgba(10,22,40,0.06);
            --surface-card: rgba(255,255,255,0.85);
            --border: rgba(10,22,40,0.12);
            --border-hover: rgba(10,22,40,0.22);
            --border-strong: rgba(10,22,40,0.35);
            --text: #1A1A2E;
            --text-dim: #3D3D56;
            --text-muted: #8A8A9A;
            --gold: #B8941E;
            --gold-bright: #D4AF37;
            --brass: #A07830;
            --accent: #B8941E;
            --accent-dim: rgba(184,148,30,0.10);
            --accent-glow: rgba(184,148,30,0.15);
            --topbar-bg: rgba(250,247,240,0.92);
            --card-heading: #0A1628;
            --card-hover-shadow: rgba(10,22,40,0.08);
            --pattern-line: rgba(10,22,40,0.03);
            --gold-gradient: linear-gradient(135deg, #B8941E, #D4AF37, #A07830);
            --gold-line: linear-gradient(90deg, transparent, #B8941E, transparent);
            --deco-pattern: rgba(10,22,40,0.02);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

        body {
            font-family: 'Raleway', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100dvh;
            overflow-x: hidden;
            font-weight: 400;
        }

        /* ─── Art Deco Background Pattern ─────────────── */
        .scene {
            position: fixed;
            inset: 0;
            z-index: -1;
            overflow: hidden;
            pointer-events: none;
        }

        /* Radial gold glow at top */
        .scene::before {
            content: '';
            position: absolute;
            width: 1000px;
            height: 600px;
            top: -200px;
            left: 50%;
            transform: translateX(-50%);
            background: radial-gradient(ellipse, rgba(212,175,55,0.06) 0%, transparent 70%);
        }

        /* Subtle warm glow bottom right */
        .scene::after {
            content: '';
            position: absolute;
            width: 500px;
            height: 500px;
            bottom: -150px;
            right: -100px;
            background: radial-gradient(circle, rgba(197,151,91,0.04) 0%, transparent 70%);
        }

        /* Geometric grid overlay - art deco diamond pattern */
        .grid-overlay {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background-image:
                linear-gradient(45deg, var(--deco-pattern) 1px, transparent 1px),
                linear-gradient(-45deg, var(--deco-pattern) 1px, transparent 1px);
            background-size: 40px 40px;
            mask-image: radial-gradient(ellipse 80% 60% at 50% 30%, black 5%, transparent 75%);
        }

        /* ─── Deco Decorative Elements ────────────────── */
        .deco-frame {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 50;
        }

        /* Top gold line */
        .deco-frame::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold-gradient);
            opacity: 0.7;
        }

        /* ─── Shell ───────────────────────────────────── */
        .shell {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 clamp(16px, 4vw, 32px);
        }

        /* ─── Sticky Header ───────────────────────────── */
        .topbar {
            position: sticky;
            top: 0;
            z-index: 100;
            background: var(--topbar-bg);
            backdrop-filter: blur(20px) saturate(1.6);
            padding: 0 0 0;
        }

        /* Gold accent line below header */
        .topbar::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--gold-line);
            opacity: 0.5;
        }

        .topbar-title {
            text-align: center;
            padding: 20px 0 14px;
        }

        /* ─── Deco Title Treatment ────────────────────── */
        .topbar-title h1 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: clamp(1.5rem, 4.2vw, 2.2rem);
            font-weight: 600;
            letter-spacing: 0.12em;
            line-height: 1.3;
            text-transform: uppercase;
            white-space: nowrap;
            position: relative;
            display: inline-block;
        }

        .title-link {
            text-decoration: none;
            color: var(--gold);
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            position: relative;
        }

        /* Ornamental rules above and below title */
        .topbar-title h1::before,
        .topbar-title h1::after {
            content: '';
            display: block;
            margin: 0 auto;
            background: var(--gold-line);
            opacity: 0.6;
        }

        .topbar-title h1::before {
            width: 160px;
            height: 1px;
            margin-bottom: 10px;
        }

        .topbar-title h1::after {
            width: 100px;
            height: 1px;
            margin-top: 10px;
        }

        /* Deco diamond ornament between title lines */
        .title-ornament {
            display: block;
            text-align: center;
            height: 10px;
            position: relative;
            margin-top: 4px;
        }

        .title-ornament::before {
            content: '◆';
            font-size: 6px;
            color: var(--gold);
            opacity: 0.6;
            letter-spacing: 12px;
        }

        /* ─── Theme Toggle ────────────────────────────── */
        .theme-toggle {
            position: fixed;
            right: clamp(16px, 4vw, 32px);
            bottom: 28px;
            z-index: 200;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--gold);
            cursor: pointer;
            transition: color 0.3s, background 0.3s, border-color 0.3s, transform 0.3s;
            /* Art deco octagonal shape via clip-path */
            clip-path: polygon(
                30% 0%, 70% 0%, 100% 30%, 100% 70%,
                70% 100%, 30% 100%, 0% 70%, 0% 30%
            );
        }

        @media (hover: hover) {
            .theme-toggle:hover {
                color: var(--gold-bright);
                background: var(--surface-hover);
                border-color: var(--border-hover);
                transform: rotate(22.5deg);
            }
        }

        .theme-toggle:focus-visible {
            color: var(--gold-bright);
            outline: none;
            border-color: var(--gold);
        }

        .theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* ─── Navigation ──────────────────────────────── */
        .topbar-nav {
            overflow: hidden;
        }

        .topbar-inner {
            max-width: var(--max-w);
            margin: 0 auto;
            padding: 0 clamp(16px, 4vw, 32px) 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .topbar-inner::-webkit-scrollbar { display: none; }

        .topbar-inner a {
            flex: 0 0 auto;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 16px;
            font-family: 'Raleway', sans-serif;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-muted);
            text-decoration: none;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border: 1px solid transparent;
            position: relative;
            transition: color 0.3s, background 0.3s, border-color 0.3s;
            white-space: nowrap;
        }

        /* Gold underline on hover */
        .topbar-inner a::after {
            content: '';
            position: absolute;
            bottom: 2px;
            left: 16px;
            right: 16px;
            height: 1px;
            background: var(--gold);
            transform: scaleX(0);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
        }

        @media (hover: hover) {
            .topbar-inner a:hover {
                color: var(--cream);
            }
            .topbar-inner a:hover::after {
                transform: scaleX(1);
            }
        }

        .topbar-inner a:focus-visible {
            color: var(--cream);
            outline: none;
        }

        .topbar-inner a.active {
            color: var(--gold);
            background: var(--accent-dim);
            border-color: var(--border);
        }

        .topbar-inner a.active::after {
            transform: scaleX(1);
            background: var(--gold);
        }

        /* ─── Deco Divider ────────────────────────────── */
        .deco-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            padding: 8px 0;
            opacity: 0.4;
        }

        .deco-divider-line {
            flex: 1;
            max-width: 120px;
            height: 1px;
            background: var(--gold-line);
        }

        .deco-divider-diamond {
            width: 6px;
            height: 6px;
            background: var(--gold);
            transform: rotate(45deg);
            flex-shrink: 0;
        }

        /* ─── Cards ───────────────────────────────────── */
        .cards {
            padding: 28px 0 80px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .card {
            position: relative;
            background: var(--surface-card);
            border: 1px solid var(--border);
            overflow: hidden;
            scroll-margin-top: calc(var(--nav-h) + 32px);
            transition: border-color 0.4s, box-shadow 0.4s;
        }

        /* Inner chamfer effect - double border */
        .card::before {
            content: '';
            position: absolute;
            inset: 4px;
            border: 1px solid rgba(212,175,55,0.08);
            pointer-events: none;
            z-index: 1;
        }

        .card:hover {
            border-color: var(--border-hover);
            box-shadow:
                0 0 60px var(--card-hover-shadow),
                inset 0 0 40px rgba(212,175,55,0.02);
        }

        .card:hover::before {
            border-color: rgba(212,175,55,0.14);
        }

        /* Top gold accent line with art deco fan shape */
        .card-accent {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--gold-line);
            opacity: 0.6;
            z-index: 2;
        }

        /* Corner ornaments */
        .card-corner {
            position: absolute;
            width: 20px;
            height: 20px;
            z-index: 2;
            pointer-events: none;
        }

        .card-corner::before,
        .card-corner::after {
            content: '';
            position: absolute;
            background: var(--gold);
            opacity: 0.25;
        }

        .card-corner--tl { top: 8px; left: 8px; }
        .card-corner--tl::before { top: 0; left: 0; width: 16px; height: 1px; }
        .card-corner--tl::after { top: 0; left: 0; width: 1px; height: 16px; }

        .card-corner--tr { top: 8px; right: 8px; }
        .card-corner--tr::before { top: 0; right: 0; width: 16px; height: 1px; }
        .card-corner--tr::after { top: 0; right: 0; width: 1px; height: 16px; }

        .card-corner--bl { bottom: 8px; left: 8px; }
        .card-corner--bl::before { bottom: 0; left: 0; width: 16px; height: 1px; }
        .card-corner--bl::after { bottom: 0; left: 0; width: 1px; height: 16px; }

        .card-corner--br { bottom: 8px; right: 8px; }
        .card-corner--br::before { bottom: 0; right: 0; width: 16px; height: 1px; }
        .card-corner--br::after { bottom: 0; right: 0; width: 1px; height: 16px; }

        .card-inner {
            padding: clamp(24px, 3.5vw, 44px);
            position: relative;
            z-index: 3;
        }

        /* Geometric fan pattern watermark in card */
        .card-deco-bg {
            position: absolute;
            bottom: -40px;
            right: -40px;
            width: 200px;
            height: 200px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
        }

        .card-deco-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                conic-gradient(from 0deg at 0% 100%,
                    var(--gold) 0deg,
                    transparent 10deg,
                    transparent 20deg,
                    var(--gold) 20deg,
                    transparent 30deg,
                    transparent 40deg,
                    var(--gold) 40deg,
                    transparent 50deg,
                    transparent 60deg,
                    var(--gold) 60deg,
                    transparent 70deg,
                    transparent 80deg,
                    var(--gold) 80deg,
                    transparent 90deg
                );
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 24px;
            padding-bottom: 18px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        /* Deco chevron accent on header border */
        .card-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 50px;
            height: 1px;
            background: var(--gold);
            opacity: 0.6;
        }

        .card-header h2 {
            font-family: 'Cinzel', 'Times New Roman', serif;
            font-size: clamp(1.3rem, 3vw, 1.7rem);
            font-weight: 600;
            letter-spacing: 0.06em;
            color: var(--card-heading);
            line-height: 1.3;
            text-transform: uppercase;
        }

        .card-source {
            margin-left: auto;
            flex-shrink: 0;
            font-family: 'Raleway', sans-serif;
            font-size: 0.65rem;
            font-weight: 500;
            color: var(--text-muted);
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 4px 12px;
            letter-spacing: 0.05em;
            text-transform: uppercase;
        }

        /* ─── Markdown Content ────────────────────────── */
        .md {
            font-size: 0.93rem;
            color: var(--text-dim);
            text-align: justify;
            font-weight: 400;
        }

        .md h1 { display: none; }

        .md h2 {
            font-family: 'Cinzel', serif;
            font-size: 0.78rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.14em;
            color: var(--gold);
            margin: 32px 0 14px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
            position: relative;
        }

        /* Deco dot ornament after section headings */
        .md h2::after {
            content: '◆';
            position: absolute;
            bottom: -5px;
            left: 0;
            font-size: 5px;
            color: var(--gold);
            opacity: 0.5;
        }

        .md h2:first-of-type {
            margin-top: 0;
        }

        .md h3 {
            font-family: 'Cinzel', serif;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text);
            margin: 24px 0 10px;
            letter-spacing: 0.04em;
        }

        .md p {
            margin: 0 0 14px;
            line-height: 1.75;
        }

        .md ul {
            margin: 0 0 16px;
            padding-left: 22px;
        }

        .md li {
            margin-top: 7px;
            line-height: 1.7;
        }

        .md li::marker {
            content: '◆ ';
            color: var(--gold);
            font-size: 0.5em;
        }

        .md strong {
            color: var(--text);
            font-weight: 600;
        }

        .md code {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.15em 0.5em;
            color: var(--brass);
        }

        .md a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 500;
            border-bottom: 1px solid rgba(212,175,55,0.25);
            transition: border-color 0.3s, color 0.3s;
        }

        @media (hover: hover) {
            .md a:hover {
                border-bottom-color: var(--gold);
                color: var(--gold-bright);
            }
        }

        .md a:focus-visible {
            border-bottom-color: var(--gold);
            outline: none;
        }

        /* Resources block */
        .md .resources-block {
            margin-top: 28px;
            padding: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            position: relative;
        }

        /* Deco left accent */
        .md .resources-block::before {
            content: '';
            position: absolute;
            top: 8px;
            bottom: 8px;
            left: 0;
            width: 2px;
            background: var(--gold-gradient);
            opacity: 0.5;
        }

        .md .resources-block h2 {
            margin-top: 0;
            border-bottom: none;
            padding-bottom: 0;
            color: var(--gold);
        }

        .md .resources-block h2::after {
            display: none;
        }

        .md .resources-block a {
            color: var(--gold);
            border-bottom-color: rgba(212,175,55,0.2);
        }

        @media (hover: hover) {
            .md .resources-block a:hover {
                border-bottom-color: var(--gold);
            }
        }

        /* Loading */
        .card-loading {
            color: var(--text-muted);
            font-size: 0.9rem;
            font-style: italic;
            letter-spacing: 0.06em;
            animation: deco-pulse 1.8s ease-in-out infinite;
        }

        .card-loading::after { content: '...'; }

        @keyframes deco-pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Card enter animation - elegant scale and fade */
        .card {
            opacity: 0;
            transform: translateY(30px) scale(0.98);
            transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1),
                        transform 0.8s cubic-bezier(0.16,1,0.3,1),
                        border-color 0.4s, box-shadow 0.4s;
        }

        .card.visible {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        /* Staggered entrance delays */
        .card:nth-child(1) { transition-delay: 0s; }
        .card:nth-child(2) { transition-delay: 0.08s; }
        .card:nth-child(3) { transition-delay: 0.16s; }
        .card:nth-child(4) { transition-delay: 0.24s; }
        .card:nth-child(5) { transition-delay: 0.32s; }
        .card:nth-child(6) { transition-delay: 0.4s; }
        .card:nth-child(7) { transition-delay: 0.48s; }

        /* ─── Geometric Divider Between Cards ─────────── */
        .card + .card::before {
            /* Overridden by the inner frame, so we use a wrapper */
        }

        .card-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 4px 0;
        }

        .card-divider span:first-child,
        .card-divider span:last-child {
            flex: 1;
            max-width: 80px;
            height: 1px;
            background: var(--gold-line);
            opacity: 0.3;
        }

        .card-divider span:nth-child(2) {
            width: 5px;
            height: 5px;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.3;
        }

        /* ─── Footer ──────────────────────────────────── */
        footer {
            text-align: center;
            padding: 0 24px 56px;
            color: var(--text-muted);
            font-family: 'Raleway', sans-serif;
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .footer-deco {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            margin-bottom: 20px;
        }

        .footer-deco-line {
            width: 60px;
            height: 1px;
            background: var(--gold-line);
            opacity: 0.4;
        }

        .footer-deco-shape {
            position: relative;
            width: 12px;
            height: 12px;
        }

        .footer-deco-shape::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--gold);
            transform: rotate(45deg);
            opacity: 0.4;
        }

        .footer-deco-shape::after {
            content: '';
            position: absolute;
            inset: 3px;
            background: var(--gold);
            transform: rotate(45deg);
            opacity: 0.2;
        }

        /* ─── Gold Shimmer on Card Hover ──────────────── */
        .card .card-inner::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(212,175,55,0.03),
                transparent
            );
            transition: none;
            z-index: 0;
            pointer-events: none;
        }

        .card:hover .card-inner::before {
            animation: shimmer 1.2s ease forwards;
        }

        @keyframes shimmer {
            0% { left: -100%; }
            100% { left: 200%; }
        }

        /* ─── Sunburst Header Decoration ──────────────── */
        .sunburst {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 300px;
            height: 300px;
            pointer-events: none;
            opacity: 0.015;
            z-index: -1;
        }

        .sunburst::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                repeating-conic-gradient(
                    from 0deg,
                    var(--gold) 0deg 2deg,
                    transparent 2deg 15deg
                );
            mask-image: radial-gradient(circle, black 20%, transparent 70%);
            -webkit-mask-image: radial-gradient(circle, black 20%, transparent 70%);
        }

        /* ─── Responsive ──────────────────────────────── */
        @media (max-width: 640px) {
            .card-source { display: none; }
            .card-header { gap: 10px; }
            .theme-toggle { display: none; }
            .topbar-title h1 {
                font-size: clamp(1rem, 5vw, 1.4rem);
                letter-spacing: 0.06em;
            }
            .title-abbr { display: none; }
            .topbar { background: var(--bg); }
            .grid-overlay { display: none; }
            .scene { display: none; }
            .deco-frame { display: none; }
            .card-corner { display: none; }
            .card::before { display: none; }
            .card-deco-bg { display: none; }
            .topbar-inner { justify-content: flex-start; }
            .topbar-title h1::before { width: 80px; }
            .topbar-title h1::after { width: 60px; }
        }

        @media (prefers-reduced-motion: reduce) {
            html { scroll-behavior: auto; }
            .card,
            .topbar-inner a {
                transition: none;
                animation: none;
                opacity: 1;
                transform: none;
            }
            .card:hover .card-inner::before { animation: none; }
        }

        /* ─── Scrollbar Styling ───────────────────────── */
        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-deep);
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(212,175,55,0.2);
            border-radius: 0;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(212,175,55,0.35);
        }

        /* ─── Selection Color ─────────────────────────── */
        ::selection {
            background: rgba(212,175,55,0.25);
            color: var(--cream);
        }
    </style>
</head>
<body>
    <div class="scene" aria-hidden="true"></div>
    <div class="grid-overlay" aria-hidden="true"></div>
    <div class="deco-frame" aria-hidden="true"></div>

    <!-- Theme toggle -->
    <button class="theme-toggle" id="themeToggle" type="button" aria-label="Toggle theme">
        <svg id="themeIcon" viewBox="0 0 24 24"></svg>
    </button>

    <!-- Sticky Header + Nav -->
    <header class="topbar" aria-label="Frontier topics">
        <div class="topbar-title shell" style="position:relative;">
            <div class="sunburst" aria-hidden="true"></div>
            <h1>
                <a href="https://fdx.guygregory.com/" class="title-link">Frontier Disambiguation Experience<span class="title-abbr"> (FDX)</span></a>
            </h1>
            <div class="title-ornament" aria-hidden="true"></div>
        </div>
        <nav class="topbar-nav">
            <div class="topbar-inner" id="topNav"></div>
        </nav>
    </header>

    <!-- Content -->
    <div class="shell">
        <div class="cards" id="cardContainer"></div>
    </div>

    <footer>
        <div class="footer-deco" aria-hidden="true">
            <div class="footer-deco-line"></div>
            <div class="footer-deco-shape"></div>
            <div class="footer-deco-line"></div>
        </div>
        Created by Guy Gregory and GitHub Copilot
    </footer>

    <script>
    (() => {
        'use strict';

        const TOPICS = [
            { id: 'frontier-firm', label: 'Frontier Firm', src: '../frontierfirm.md' },
            { id: 'frontier-program', label: 'Frontier Program', src: '../frontierprogram.md' },
            { id: 'frontier-partner', label: 'Frontier Partner', src: '../frontierpartner.md' },
            { id: 'frontier-distributor', label: 'Frontier Distributor', src: '../frontierdistributor.md' },
            { id: 'frontier-ai', label: 'Frontier AI', src: '../frontierai.md' },
            { id: 'frontier-model-forum', label: 'Frontier Model Forum', src: '../frontiermodelforum.md' },
            { id: 'openai-frontier', label: 'OpenAI Frontier', src: '../openaifrontier.md' },
            { id: 'frontier-engineer', label: 'Frontier Engineer', src: '../frontierengineer.md' }
        ];

        const nav = document.getElementById('topNav');
        const container = document.getElementById('cardContainer');

        /* ── Build DOM ───────────────────────────────── */
        function build() {
            const navFrag = document.createDocumentFragment();
            const cardFrag = document.createDocumentFragment();

            TOPICS.forEach((t, i) => {
                // nav link
                const a = document.createElement('a');
                a.href = `#${t.id}`;
                a.dataset.target = t.id;
                a.innerHTML = esc(t.label);
                navFrag.appendChild(a);

                // geometric divider between cards
                if (i > 0) {
                    const divider = document.createElement('div');
                    divider.className = 'card-divider';
                    divider.setAttribute('aria-hidden', 'true');
                    divider.innerHTML = '<span></span><span></span><span></span>';
                    cardFrag.appendChild(divider);
                }

                // card
                const article = document.createElement('article');
                article.className = 'card';
                article.id = t.id;
                article.setAttribute('aria-busy', 'true');
                article.innerHTML = `
                    <div class="card-accent" aria-hidden="true"></div>
                    <div class="card-corner card-corner--tl" aria-hidden="true"></div>
                    <div class="card-corner card-corner--tr" aria-hidden="true"></div>
                    <div class="card-corner card-corner--bl" aria-hidden="true"></div>
                    <div class="card-corner card-corner--br" aria-hidden="true"></div>
                    <div class="card-deco-bg" aria-hidden="true"></div>
                    <div class="card-inner">
                        <header class="card-header">
                            <h2>${esc(t.label)}</h2>
                            <span class="card-source">${esc(t.src)}</span>
                        </header>
                        <div class="md" aria-live="polite">
                            <p class="card-loading">Loading</p>
                        </div>
                    </div>`;
                cardFrag.appendChild(article);
            });

            nav.appendChild(navFrag);
            container.appendChild(cardFrag);
        }

        /* ── Fetch & Render Markdown ─────────────────── */
        async function hydrate() {
            const cards = Array.from(document.querySelectorAll('.card[aria-busy]'));
            await Promise.all(cards.map(async card => {
                const topic = TOPICS.find(t => t.id === card.id);
                if (!topic) return;
                const mdEl = card.querySelector('.md');
                try {
                    const res = await fetch(topic.src, { cache: 'no-store' });
                    if (!res.ok) throw new Error(res.status);
                    mdEl.innerHTML = md(await res.text());
                    wrapResources(mdEl);
                } catch {
                    mdEl.innerHTML = '<p>Unable to load content.</p>';
                } finally {
                    card.removeAttribute('aria-busy');
                }
            }));
        }

        /* ── Markdown parser ─────────────────────────── */
        function md(raw) {
            const lines = raw.replace(/\r\n/g, '\n').split('\n');
            let out = '';
            let buf = [];
            let ul = false;

            const flush = () => { if (buf.length) { out += `<p>${inline(buf.join(' '))}</p>`; buf = []; } };
            const closeUl = () => { if (ul) { out += '</ul>'; ul = false; } };

            for (const rawLine of lines) {
                const line = rawLine.trim();
                if (!line) { flush(); closeUl(); continue; }

                const hm = line.match(/^(#{1,3})\s+(.*)$/);
                if (hm) { flush(); closeUl(); const l = hm[1].length; out += `<h${l}>${inline(hm[2])}</h${l}>`; continue; }

                const lm = rawLine.match(/^\s*[-*]\s+(.*)$/);
                if (lm) { flush(); if (!ul) { out += '<ul>'; ul = true; } out += `<li>${inline(lm[1])}</li>`; continue; }

                buf.push(line);
            }
            flush();
            closeUl();
            return out;
        }

        function inline(t) {
            let s = esc(t);
            s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>');
            s = s.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
            return s;
        }

        function esc(v) {
            return v.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
        }

        /* ── Wrap Resources sections ─────────────────── */
        function wrapResources(el) {
            el.querySelectorAll('h2').forEach(h => {
                if (h.textContent.trim().toLowerCase() !== 'resources') return;
                const wrap = document.createElement('section');
                wrap.className = 'resources-block';
                h.parentNode.insertBefore(wrap, h);
                let cur = h;
                while (cur) {
                    const next = cur.nextElementSibling;
                    wrap.appendChild(cur);
                    if (!next || next.tagName === 'H2') break;
                    cur = next;
                }
            });
        }

        /* ── Sticky nav offset ───────────────────────── */
        function measureNav() {
            const bar = document.querySelector('.topbar');
            if (bar) document.documentElement.style.setProperty('--nav-h', bar.offsetHeight + 'px');
        }

        /* ── Scroll-reveal cards ─────────────────────── */
        function initReveal() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.card').forEach(c => c.classList.add('visible'));
                return;
            }
            const io = new IntersectionObserver((entries, obs) => {
                entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
            }, { rootMargin: '0px 0px -8% 0px', threshold: 0.05 });
            document.querySelectorAll('.card').forEach(c => io.observe(c));
        }

        /* ── Active nav tracking ─────────────────────── */
        function initActiveNav() {
            if (!('IntersectionObserver' in window)) return;
            const links = Array.from(nav.querySelectorAll('a[data-target]'));
            const sections = links.map(l => document.getElementById(l.dataset.target)).filter(Boolean);
            let clickLock = false;

            const setActive = id => {
                links.forEach(l => {
                    const on = l.dataset.target === id;
                    l.classList.toggle('active', on);
                    on ? l.setAttribute('aria-current', 'true') : l.removeAttribute('aria-current');
                    if (on) l.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
                });
            };

            const io = new IntersectionObserver(entries => {
                if (clickLock) return;
                const vis = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
                if (vis.length) setActive(vis[0].target.id);
            }, { rootMargin: '-40% 0px -50% 0px', threshold: 0 });

            sections.forEach(s => io.observe(s));

            // Click handler
            nav.addEventListener('click', e => {
                const a = e.target.closest('a[data-target]');
                if (!a) return;
                e.preventDefault();
                const target = document.getElementById(a.dataset.target);
                if (!target) return;
                clickLock = true;
                setActive(a.dataset.target);
                scrollToCard(target);
                history.replaceState(null, '', `#${a.dataset.target}`);
                setTimeout(() => { clickLock = false; }, 1000);
            });
        }

        /* ── Scroll helper ───────────────────────────── */
        function scrollToCard(el) {
            const bar = document.querySelector('.topbar');
            const gap = 20;
            const top = el.getBoundingClientRect().top + window.scrollY - (bar ? bar.offsetHeight : 0) - gap;
            window.scrollTo({ top, behavior: 'smooth' });
        }

        /* ── Initial hash ────────────────────────────── */
        function jumpHash() {
            const { hash } = window.location;
            if (!hash) return;
            const el = document.querySelector(hash);
            if (el) requestAnimationFrame(() => scrollToCard(el));
        }

        /* ── Theme toggle ─────────────────────────────── */
        const ICONS = {
            dark: '<path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/>',
            light: '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>',
            system: '<rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>'
        };
        const MODES = ['system', 'dark', 'light'];
        const themeBtn = document.getElementById('themeToggle');
        const themeIcon = document.getElementById('themeIcon');

        function getPreferred() {
            return localStorage.getItem('fdx-theme') || 'system';
        }

        function resolveTheme(mode) {
            if (mode === 'system') return window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
            return mode;
        }

        function applyTheme(mode) {
            const resolved = resolveTheme(mode);
            document.documentElement.classList.toggle('light', resolved === 'light');
            themeIcon.innerHTML = ICONS[mode];
            themeBtn.setAttribute('aria-label', `Theme: ${mode}`);
        }

        const MOBILE_BP = 640;

        function isMobile() {
            return window.innerWidth <= MOBILE_BP;
        }

        function initTheme() {
            applyTheme(isMobile() ? 'system' : getPreferred());
            themeBtn.addEventListener('click', () => {
                if (isMobile()) return;
                const cur = getPreferred();
                const next = MODES[(MODES.indexOf(cur) + 1) % MODES.length];
                localStorage.setItem('fdx-theme', next);
                applyTheme(next);
            });
            window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', () => {
                if (isMobile() || getPreferred() === 'system') applyTheme('system');
            });
            window.addEventListener('resize', () => {
                if (isMobile()) applyTheme('system');
                else applyTheme(getPreferred());
            }, { passive: true });
        }

        /* ── Boot ────────────────────────────────────── */
        document.addEventListener('DOMContentLoaded', async () => {
            initTheme();
            build();
            measureNav();
            window.addEventListener('resize', measureNav, { passive: true });
            await hydrate();
            initReveal();
            initActiveNav();
            jumpHash();
        });
    })();
    </script>
</body>
</html>
